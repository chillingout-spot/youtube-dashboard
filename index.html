<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Live Dashboard</title>
<style>
  :root{
    --bg-base:#021711;
    --cyan:#29C9DD; --teal:#22C39E;
    --yt-red:#FF0033; --text:#F3F8F6; --text-dim:#A3BFB7;
    --glass-bg:rgba(180,255,230,0.065); --glass-border:rgba(170,255,235,0.14);
    --glass-blur:24px; --radius:26px;
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",
           "Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",Meiryo,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);color:var(--text);background:
      linear-gradient(165deg, #052A20 0%, #041A14 40%, #020D0A 75%, #010806 100%) var(--bg-base);
    overflow-x:hidden;-webkit-font-smoothing:antialiased;letter-spacing:.01em}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(58% 52% at 16% 12%, rgba(34,195,158,.16), transparent 60%),
      radial-gradient(52% 48% at 86% 20%, rgba(41,201,221,.10), transparent 62%),
      radial-gradient(58% 58% at 82% 90%, rgba(34,195,158,.12), transparent 60%),
      radial-gradient(52% 52% at 10% 92%, rgba(41,201,221,.08), transparent 62%);
    filter:saturate(112%)}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

  #dash{position:relative;z-index:1;min-height:100%;padding:22px 28px 32px;max-width:1760px;margin:0 auto}
  .topbar{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .avatar{width:56px;height:56px;border-radius:50%;object-fit:cover;flex:none;
    border:2px solid var(--glass-border);background:rgba(255,255,255,.05)}
  .ch-name{font-size:22px;font-weight:600;letter-spacing:-.02em;line-height:1.1}
  .ch-handle{color:var(--text-dim);font-size:13px;margin-top:3px}
  .live{margin-left:auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:flex-end}
  .live-dot{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim);font-weight:600;letter-spacing:.04em}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);
    box-shadow:0 0 0 0 rgba(45,212,191,.6);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(45,212,191,.55)}70%{box-shadow:0 0 0 11px rgba(45,212,191,0)}100%{box-shadow:0 0 0 0 rgba(45,212,191,0)}}
  .updated{font-size:12px;color:var(--text-dim)}

  .card{background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur)) saturate(155%);
    -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(155%);
    border:1px solid var(--glass-border);border-radius:18px;box-shadow:0 22px 60px rgba(0,0,0,.32)}

  .kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:18px}
  .kpi-strip .mini{padding:14px 18px;min-height:84px;display:flex;flex-direction:column;justify-content:space-between}
  .kpi-strip .mini .label{font-size:11.5px;color:var(--text-dim);font-weight:600;letter-spacing:.02em;line-height:1.4}
  .kpi-strip .mini .value{font-size:clamp(18px,1.8vw,24px);font-weight:700;letter-spacing:-.02em;margin-top:6px;line-height:1.1}
  @media(max-width:980px){.kpi-strip{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:480px){.kpi-strip{grid-template-columns:1fr}}

  .delta.up{color:var(--teal)} .delta.down{color:var(--yt-red)} .delta.flat{color:var(--text-dim)}
  .delta .lbl{opacity:.6;font-weight:600}

  .monet{padding:18px 22px;margin-top:14px}
  .monet-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .monet-head .bar{width:4px;height:18px;border-radius:3px;background:linear-gradient(var(--cyan),var(--teal))}
  .monet-head h2{font-size:16px;font-weight:600;letter-spacing:-.01em}
  .monet-head .monet-sub{font-size:12px;color:var(--text-dim)}
  .monet-head .monet-done{margin-left:auto;font-size:13px;font-weight:700;color:var(--teal)}
  .monet-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:760px){.monet-grid{grid-template-columns:1fr;gap:18px}}
  .gauge{display:flex;align-items:center;gap:16px}
  .gauge-info .glabel{font-size:12.5px;color:var(--text-dim);font-weight:600}
  .gauge-info .gv{font-size:21px;font-weight:700;letter-spacing:-.02em;margin-top:5px}
  .gauge-info .gv span{font-size:13px;color:var(--text-dim);font-weight:600}
  .gauge-info .gr{font-size:12.5px;color:var(--text-dim);margin-top:7px}
  .gauge-info .gr b{color:var(--text);font-weight:700}

  .chart-card{padding:16px 20px;margin-top:14px}
  .chart-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .chart-head .bar{width:4px;height:18px;border-radius:3px;background:linear-gradient(var(--cyan),var(--teal))}
  .chart-head h2{font-size:16px;font-weight:600;letter-spacing:-.01em}
  .chart-head .days{font-size:12px;color:var(--text-dim)}
  .chart-head .cdelta{font-size:13px;font-weight:700}
  .toggle{margin-left:auto;display:flex;gap:6px;background:rgba(255,255,255,.05);
    border:1px solid var(--glass-border);border-radius:11px;padding:3px}
  .toggle button{font-family:var(--font);font-size:12px;font-weight:600;color:var(--text-dim);
    background:none;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;transition:.2s}
  .toggle button.on{background:linear-gradient(135deg,var(--cyan),var(--teal));color:#04121A}
  .chart-svg{width:100%;height:auto;display:block;margin-top:4px;max-height:200px}
  .chart-empty{padding:32px 0;text-align:center;color:var(--text-dim);font-size:13px;line-height:1.7}

  .rank-card{padding:8px 14px 16px;margin-top:14px;overflow-x:auto}
  .rank-table{width:100%;border-collapse:collapse;table-layout:fixed}
  .rank-table th,.rank-table td{padding:9px 8px;text-align:left;border-bottom:1px solid var(--glass-border);font-size:13px;vertical-align:middle}
  .rank-table th{color:var(--text-dim);font-weight:600;font-size:11.5px}
  .rank-table tbody tr:last-child td{border-bottom:none}
  .rank-table .col-rank{width:40px}
  .rank-table .col-thumb{width:84px}
  .rank-table .col-views{width:100px}
  .rank-table .rank{font-weight:700;color:var(--text-dim)}
  .rank-table .thumb-cell img{width:68px;height:38px;object-fit:cover;border-radius:7px;display:block;background:rgba(255,255,255,.05)}
  .rank-table .title-cell{font-weight:600;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rank-table .views-cell{font-weight:700;text-align:right}
  .rank-table a.vlink{display:block;color:inherit;text-decoration:none}
  .rank-table a.vlink:hover{color:var(--teal)}
  @media(max-width:600px){.rank-table .col-thumb{width:60px}.rank-table .thumb-cell img{width:48px;height:27px}}

  .memo-card{padding:18px 22px;margin-top:14px}
  .memo-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .memo-head .bar{width:4px;height:18px;border-radius:3px;background:linear-gradient(var(--cyan),var(--teal))}
  .memo-head h2{font-size:16px;font-weight:600;letter-spacing:-.01em}
  .memo-head .memo-updated{margin-left:auto;font-size:12px;color:var(--text-dim)}
  .memo-body{font-size:15px;line-height:1.9;color:var(--text);white-space:pre-wrap;letter-spacing:.01em}

  .section-h{display:flex;align-items:center;gap:10px;margin:22px 2px 12px}
  .section-h .bar{width:4px;height:18px;border-radius:3px;background:var(--yt-red)}
  .section-h h2{font-size:16px;font-weight:600;letter-spacing:-.01em}
  .videos{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .vid{padding:11px;display:flex;flex-direction:column}
  .vid .thumb{position:relative;width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;background:rgba(255,255,255,.05);display:block}
  .vid .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .vid .title{font-size:13px;font-weight:600;line-height:1.4;margin-top:10px;color:inherit;text-decoration:none;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .vid a.title:hover,.vid a.thumb:hover{opacity:.85}
  .vid .date{font-size:11px;color:var(--text-dim);margin-top:5px}
  .vid .stats{display:flex;gap:12px;margin-top:10px;padding-top:10px;border-top:1px solid var(--glass-border)}
  .vid .stat{display:flex;flex-direction:column;gap:2px}
  .vid .stat .n{font-size:14px;font-weight:700} .vid .stat .n.red{color:var(--yt-red)}
  .vid .stat .t{font-size:10.5px;color:var(--text-dim)}
  .loading{text-align:center;color:var(--text-dim);padding:90px 0;font-size:15px;line-height:1.8}

  @media(min-width:1400px){
    #content{display:grid;grid-template-columns:1fr 1fr;gap:0 18px;align-items:start}
    #content > .kpi-strip,#content > .section-h,#content > .rank-card,#content > .videos,#content > .loading{grid-column:1/-1}
    #content > .monet{grid-column:1}
    #content > .chart-card{grid-column:2}
  }
  @media(max-width:760px){#dash{padding:18px 14px 28px}}
  @media(prefers-reduced-motion:reduce){.dot{animation:none}*{transition:none!important}}
</style>
</head>
<body>
<div id="dash">
  <div class="topbar">
    <img class="avatar" id="avatar" alt="">
    <div class="ch-meta"><div class="ch-name" id="chName">—</div><div class="ch-handle" id="chHandle"></div></div>
    <div class="live"><div class="live-dot"><span class="dot"></span> LIVE</div><div class="updated" id="updated"></div></div>
  </div>
  <div id="content"><div class="loading">データを読み込んでいます…</div></div>
</div>

<script>
"use strict";
// このダッシュボードは、GitHub Actions が毎日生成する data/latest.json と
// data/history.json を読むだけ。APIキーは一切持たないので公開しても安全です。
const REFRESH_MS = 5 * 60 * 1000;   // 5分ごとに最新ファイルを読み直す
let chartMetric = "subs";
let lastData = null;

async function loadJSON(url){
  const res = await fetch(url + "?t=" + Date.now());   // キャッシュ回避
  if (!res.ok) throw new Error(url + " が見つかりません");
  return res.json();
}
async function load(){
  let latest, history;
  try { latest = await loadJSON("data/latest.json"); }
  catch(e){
    document.getElementById("content").innerHTML =
      `<div class="loading">まだデータがありません。<br>
       GitHub の「Actions」タブから <b>Update YouTube stats</b> を一度手動実行すると表示されます。</div>`;
    return;
  }
  try { history = await loadJSON("data/history.json"); } catch { history = []; }
  lastData = { latest, history };
  render(latest, history);
}

function render(latest, history){
  document.getElementById("avatar").src = latest.channel.thumb || "";
  document.getElementById("chName").textContent = latest.channel.title || "—";
  document.getElementById("chHandle").textContent = latest.channel.handle || "";
  const t = new Date(latest.updatedAt);
  document.getElementById("updated").textContent =
    "最終更新 " + t.toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});

  const subs=latest.subs, views=latest.views, vcount=latest.videos, hours=latest.hours;
  const subsGoal=latest.subsGoal||1000, hoursGoal=latest.hoursGoal||4000;

  let rLikes=0,rComments=0;
  (latest.recentVideos||[]).forEach(v=>{ rLikes+=v.likes||0; rComments+=v.comments||0; });

  document.getElementById("content").innerHTML = `
    <div class="kpi-strip">
      <div class="card mini"><div class="label">視聴回数（総再生回数）</div><div class="value num">${jpNum(views)}</div></div>
      <div class="card mini"><div class="label">登録者数</div><div class="value num">${jpNum(subs)}</div></div>
      <div class="card mini"><div class="label">高評価合算（直近動画）</div><div class="value num">${jpNum(rLikes)}</div></div>
      <div class="card mini"><div class="label">コメント合算（直近動画）</div><div class="value num">${jpNum(rComments)}</div></div>
      <div class="card mini"><div class="label">投稿本数</div><div class="value num">${comma(vcount)}</div></div>
    </div>
    ${monetCard(subs,subsGoal,hours,hoursGoal)}
    <div class="card chart-card">
      <div class="chart-head"><span class="bar"></span>
        <h2>${chartLabel(chartMetric)}の推移</h2>
        <span class="days">（${history.length}日分の記録）</span>
        ${chartDeltaTag(history,chartMetric)}
        <div class="toggle">
          <button class="${chartMetric==='subs'?'on':''}" onclick="__m('subs')">登録者</button>
          <button class="${chartMetric==='hours'?'on':''}" onclick="__m('hours')">再生時間</button>
          <button class="${chartMetric==='views'?'on':''}" onclick="__m('views')">再生回数</button>
        </div>
      </div>
      ${chart(history,chartMetric)}
    </div>
    <div class="section-h"><span class="bar"></span><h2>直近の視聴数ランキング</h2></div>
    ${rankingTable(latest.recentVideos||[])}
    ${memoCard()}
    <div class="section-h"><span class="bar"></span><h2>最新の動画</h2></div>
    <div class="videos">${(latest.recentVideos||[]).map(videoCard).join("") || `<div class="loading">動画がありません。</div>`}</div>`;
}

function monetCard(subs,subsGoal,hours,hoursGoal){
  const sp=Math.min(100,subsGoal>0?subs/subsGoal*100:0), hp=Math.min(100,hoursGoal>0?hours/hoursGoal*100:0);
  const done=subs>=subsGoal && hours>=hoursGoal;
  return `<div class="card monet">
    <div class="monet-head"><span class="bar"></span><h2>収益化まで</h2>
      <span class="monet-sub">登録者 ${comma(subsGoal)}人 ・ 総再生時間 ${comma(hoursGoal)}時間</span>
      ${done?'<span class="monet-done">条件達成 🎉</span>':''}</div>
    <div class="monet-grid">
      <div class="gauge">${ring(sp)}<div class="gauge-info"><div class="glabel">チャンネル登録者</div>
        <div class="gv num">${comma(subs)} <span>/ ${comma(subsGoal)}人</span></div>
        <div class="gr">あと <b class="num">${comma(Math.max(0,subsGoal-subs))}</b> 人</div></div></div>
      <div class="gauge">${ring(hp)}<div class="gauge-info"><div class="glabel">総再生時間</div>
        <div class="gv num">${comma(hours)} <span>/ ${comma(hoursGoal)}時間</span></div>
        <div class="gr">あと <b class="num">${comma(Math.max(0,hoursGoal-hours))}</b> 時間</div></div></div>
    </div></div>`;
}
function videoUrl(v){
  const id = v.id || (/\/vi\/([^/]+)\//.exec(v.thumb||"")||[])[1];
  return id ? "https://www.youtube.com/watch?v=" + id : null;
}
function rankingTable(videos){
  if(!videos.length) return `<div class="card rank-card"><div class="loading">動画がありません。</div></div>`;
  const rows = videos.slice().sort((a,b)=>(b.views||0)-(a.views||0)).map((v,i)=>{
    const url=videoUrl(v), a1=url?`<a class="vlink" href="${url}" target="_blank" rel="noopener">`:"", a2=url?"</a>":"";
    return `
    <tr>
      <td class="rank num">${i+1}</td>
      <td class="thumb-cell">${a1}<img loading="lazy" src="${v.thumb}" alt="">${a2}</td>
      <td class="title-cell">${a1}${escapeHtml(v.title||"")}${a2}</td>
      <td class="views-cell num">${jpNum(v.views||0)}</td>
    </tr>`;}).join("");
  return `<div class="card rank-card"><table class="rank-table">
    <colgroup><col class="col-rank"><col class="col-thumb"><col><col class="col-views"></colgroup>
    <thead><tr><th>順位</th><th>サムネ</th><th>タイトル</th><th style="text-align:right">視聴回数</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}
function memoCard(){
  return `<div class="card memo-card">
    <div class="memo-head"><span class="bar"></span><h2>📝 伸びている動画の分析メモ</h2>
      <span class="memo-updated">最終更新: 6/18</span></div>
    <div class="memo-body">■ 今の勝ちパターン（仮説）
「タバコ（独自キャラ）」×「日常の脱力ネタ or 軽いトラブル」×「あえてしょうもなく振り切ったタイトル」。
3位『近所でタバコを吸うだけ』が伸びたのは、この3つが揃っていたから。

■ 効いている要素
・タバコ／ヤニカス系は他にない武器。タイトルに出すと強い。
・「〜するだけ」の脱力タイトルが刺さる（給油しに行くだけ、等）。
・トラブル／損得ネタも共感を集める（損しない術、また壊れた）。

■ 次に試す仮説
・タバコ要素をサムネ／タイトルの前面に出した動画を増やす。
・古着・イラストも「〜なだけ」系タイトルで出して伸びるか検証。</div>
  </div>`;
}
function videoCard(v){
  const date=v.publishedAt?new Date(v.publishedAt).toLocaleDateString("ja-JP"):"";
  const url=videoUrl(v), tag=url?"a":"div", link=url?`href="${url}" target="_blank" rel="noopener"`:"";
  return `<div class="card vid"><${tag} class="thumb" ${link}><img loading="lazy" src="${v.thumb}" alt=""></${tag}>
    <${tag} class="title" ${link}>${escapeHtml(v.title||"")}</${tag}><div class="date num">${date}</div>
    <div class="stats">
      <div class="stat"><span class="n num">${jpNum(v.views||0)}</span><span class="t">再生</span></div>
      <div class="stat"><span class="n red num">${jpNum(v.likes||0)}</span><span class="t">高評価</span></div>
      <div class="stat"><span class="n num">${jpNum(v.comments||0)}</span><span class="t">コメント</span></div>
    </div></div>`;
}
function chartLabel(m){ return m==="subs"?"登録者数":m==="hours"?"総再生時間":"総再生回数"; }
function chartUnit(m){ return m==="hours"?"時間":""; }
function chart(history,metric){
  const data=history.slice(-30).filter(d=>d[metric]!=null);
  if(data.length<2) return `<div class="chart-empty">推移グラフは <b>2日分</b> たまると表示されます。（現在 ${data.length} 日分）<br>自動更新が毎日走るので、数日待てば線が伸びていきます。</div>`;
  const W=820,H=190,padL=64,padR=22,padT=14,padB=30,iW=W-padL-padR,iH=H-padT-padB;
  const vals=data.map(d=>d[metric]); let lo=Math.min(...vals),hi=Math.max(...vals);
  if(lo===hi){const p=Math.max(1,Math.round(hi*0.02));lo-=p;hi+=p;}
  const X=i=>padL+iW*i/(data.length-1), Y=v=>padT+iH*(1-(v-lo)/(hi-lo));
  const pts=data.map((d,i)=>[X(i),Y(d[metric])]);
  const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area=`M${pts[0][0].toFixed(1)} ${(padT+iH).toFixed(1)} `+pts.map(p=>"L"+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ")+` L${pts[pts.length-1][0].toFixed(1)} ${(padT+iH).toFixed(1)} Z`;
  const last=pts[pts.length-1]; let grid="";
  for(let g=0;g<=2;g++){const yy=padT+iH*g/2,val=hi-(hi-lo)*g/2;
    grid+=`<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="rgba(255,255,255,.06)"/>`;
    grid+=`<text x="${padL-10}" y="${yy+4}" text-anchor="end" fill="var(--text-dim)" font-size="12" font-family="var(--font)">${jpNum(Math.round(val))}</text>`;}
  return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="cl" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--cyan)" stop-opacity=".30"/><stop offset="100%" stop-color="var(--teal)" stop-opacity="0"/></linearGradient>
    <linearGradient id="ls" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="var(--cyan)"/><stop offset="100%" stop-color="var(--teal)"/></linearGradient></defs>
    ${grid}<path d="${area}" fill="url(#cl)"/><path d="${line}" fill="none" stroke="url(#ls)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="5" fill="var(--teal)" stroke="#04121A" stroke-width="2"/>
    <text x="${padL}" y="${H-10}" fill="var(--text-dim)" font-size="12" font-family="var(--font)">${md(data[0].date)}</text>
    <text x="${W-padR}" y="${H-10}" text-anchor="end" fill="var(--text-dim)" font-size="12" font-family="var(--font)">${md(data[data.length-1].date)}</text></svg>`;
}
function ring(pct){
  const r=46,c=2*Math.PI*r,off=c*(1-pct/100);
  return `<svg width="112" height="112" viewBox="0 0 112 112" style="flex:none">
    <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="var(--cyan)"/><stop offset="100%" stop-color="var(--teal)"/></linearGradient></defs>
    <circle cx="56" cy="56" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="10"/>
    <circle cx="56" cy="56" r="${r}" fill="none" stroke="url(#rg)" stroke-width="10" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 56 56)"/>
    <text x="56" y="61" text-anchor="middle" fill="var(--text)" font-size="23" font-weight="700" font-family="var(--font)">${Math.round(pct)}%</text></svg>`;
}
window.__m=function(m){ chartMetric=m; if(lastData) render(lastData.latest,lastData.history); };
function deltaOf(h,k){ return h.length<2?null:(h[h.length-1][k]||0)-(h[h.length-2][k]||0); }
function chartDeltaTag(h,k){ const d=deltaOf(h,k); if(d===null) return "";
  const cls=d>0?"up":d<0?"down":"flat",s=d>0?"▲ +":d<0?"▼ ":"±";
  return `<span class="cdelta delta ${cls}">${s}${comma(Math.abs(d))}${chartUnit(k)}</span>`; }
function jpNum(n){ n=Number(n)||0;
  if(n>=1e8) return (n/1e8).toFixed(n>=1e9?0:2).replace(/\.?0+$/,"")+"億";
  if(n>=1e4) return (n/1e4).toFixed(n>=1e6?0:1).replace(/\.?0+$/,"")+"万"; return comma(n); }
function comma(n){ return (Number(n)||0).toLocaleString("ja-JP"); }
function md(s){ const p=String(s).split("-"); return Number(p[1])+"/"+Number(p[2]); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

load();
setInterval(load, REFRESH_MS);
